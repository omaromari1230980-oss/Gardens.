<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المعرض</title>
    <link rel="stylesheet" href="style.css"> <!-- لو عندك CSS خارجي -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
            margin: 20px 0;
            color: #333;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>المعرض</h1>

    <div class="gallery-container">
        <div class="gallery-item">
            <img src="images/image1.jpg" alt="صورة 1">
        </div>
        <div class="gallery-item">
            <img src="images/image2.jpg" alt="صورة 2">
        </div>
        <div class="gallery-item">
            <img src="images/image3.jpg" alt="صورة 3">
        </div>
        <div class="gallery-item">
            <img src="images/image4.jpg" alt="صورة 4">
        </div>
        <div class="gallery-item">
            <img src="images/image5.jpg" alt="صورة 5">
        </div>
        <!-- أضف المزيد حسب حاجتك -->
    </div>
</body>
</html>
